name: Tests

on:
  push:
    branches: [ main, qa ]
  pull_request:
    branches: [ main, qa ]

jobs:
  frontend-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
          
      - name: Install Frontend Dependencies
        run: npm ci
        working-directory: frontend

      - name: Run Frontend Tests
        run: npm run test:coverage
        working-directory: frontend


      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-report
          path: frontend/coverage/

  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Backend Tests
        run: pytest

  deploy-coverage:
    needs: frontend-tests
    # Deploy on push to main/qa OR on pull_request (to support PR previews)
    if: (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/qa')) || (github.event_name == 'pull_request')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Download Coverage Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage-report
          path: coverage-report

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./coverage-report/lcov-report
          # Deploy to root for main/qa, or to a subfolder for PRs
          destination_dir: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || '.' }}
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

      - name: Add Coverage Comment
        uses: MishaKav/jest-coverage-comment@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          coverage-summary-path: coverage-report/coverage-summary.json
          # Use title for the prominent link
          title: ${{ github.event_name == 'pull_request' && format('Frontend Code Coverage - [View Full HTML Report](https://kamlesh-simbanic.github.io/fastapi-app/pr-{0}/index.html)', github.event.number) || 'Frontend Code Coverage - [View Full HTML Report](https://kamlesh-simbanic.github.io/fastapi-app/index.html)' }}
          summary-title: "Coverage Details"
          badge-title: "Coverage Status"
          create-new-comment: true
